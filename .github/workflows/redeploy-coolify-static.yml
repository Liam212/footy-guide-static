name: Redeploy Coolify Static Site

on:
  workflow_dispatch:

concurrency:
  group: redeploy-coolify-static
  cancel-in-progress: false

jobs:
  redeploy:
    name: Trigger Coolify deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      COOLIFY_URL: ${{ secrets.COOLIFY_API_URL }}
      COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API }}
      COOLIFY_STATIC_APP_UUID: ${{ secrets.COOLIFY_STATIC_APP_UUID }}
    steps:
      - name: Validate required secrets
        run: |
          set -euo pipefail

          missing=0
          for key in COOLIFY_URL COOLIFY_API_TOKEN COOLIFY_STATIC_APP_UUID; do
            if [ -z "${!key:-}" ]; then
              echo "::error::Missing required secret: ${key}"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Trigger deployment
        id: trigger
        run: |
          set -euo pipefail

          base_url="${COOLIFY_URL%/}"
          response_file="$(mktemp)"
          status_code="$(
            curl -sS -o "$response_file" -w "%{http_code}" \
              -X POST "${base_url}/api/v1/deploy?uuid=${COOLIFY_STATIC_APP_UUID}&force=true" \
              -H "Authorization: Bearer ${COOLIFY_API_TOKEN}" \
              -H "Accept: application/json"
          )"

          if [ "$status_code" -lt 200 ] || [ "$status_code" -ge 300 ]; then
            echo "::error::Coolify deploy trigger failed with HTTP ${status_code}"
            cat "$response_file"
            exit 1
          fi

          deployment_uuid="$(jq -r '.deployments[0].deployment_uuid // empty' "$response_file")"
          if [ -z "$deployment_uuid" ]; then
            echo "::error::Coolify response did not include a deployment UUID"
            cat "$response_file"
            exit 1
          fi

          echo "deployment_uuid=${deployment_uuid}" >> "$GITHUB_OUTPUT"
          echo "Triggered deployment ${deployment_uuid}"

      - name: Wait for deployment result
        run: |
          set -euo pipefail

          base_url="${COOLIFY_URL%/}"
          deployment_uuid="${{ steps.trigger.outputs.deployment_uuid }}"
          attempt=0
          max_attempts=60

          while [ "$attempt" -lt "$max_attempts" ]; do
            attempt=$((attempt + 1))
            response_file="$(mktemp)"

            status_code="$(
              curl -sS -o "$response_file" -w "%{http_code}" \
                -H "Authorization: Bearer ${COOLIFY_API_TOKEN}" \
                -H "Accept: application/json" \
                "${base_url}/api/v1/deployments/${deployment_uuid}"
            )"

            if [ "$status_code" -lt 200 ] || [ "$status_code" -ge 300 ]; then
              echo "::warning::Polling attempt ${attempt} failed with HTTP ${status_code}"
              cat "$response_file"
              sleep 30
              continue
            fi

            status="$(jq -r '.status // empty' "$response_file")"
            echo "Attempt ${attempt}: status=${status:-unknown}"

            case "$status" in
              finished|success)
                exit 0
                ;;
              failed|canceled|cancelled|error)
                echo "::error::Coolify deployment ${deployment_uuid} ended with status '${status}'"
                cat "$response_file"
                exit 1
                ;;
            esac

            sleep 30
          done

          echo "::error::Timed out waiting for Coolify deployment ${deployment_uuid}"
          exit 1
